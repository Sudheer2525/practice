<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="calculator.css"
    </head>
    <body>
        <table border="1px"
        align="center"
        cellpadding="10px"
        cellspacing="10px">
        <tr>
            <th colspan="4">0</th>
        </tr>
        <tr>
            <td>+</td>
            <td>-</td>
            <td>x</td>
            <td>/</td>
        </tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td rowspan="4">=</td>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr>
            <td>0</td>
            <td>.</td>
            <td>AC</td>
        </tr>
        </table>
    </body>
</html>
