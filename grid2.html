<!DOCTYPE html>
<html>
    <head>
        <title>Grid1</title>
        <style>
            .parent{
                height: 100vh;
                display: grid;
                grid-template-rows: 15% 15% 30% ;
                grid-template-columns: 15% 15% 30%;
                text-align: center;
                color: black;
                gap: 10px;
                }
            .Header{
                background-color: orange;
                grid-column: 1/4;
                grid-row: 1/2;

            }
            .search{
                background-color: green;
                grid-column: 1/3;
                grid-row: 2/3;
            }
             .right{
                background-color: pink;
                grid-column: 3/4;
                grid-row: 2/4;
            }
             .left{
                background-color: lightblue;
                grid-column: 1/2;
                grid-row: 3/4;
            }
             .middle{
                background-color: purple;
                grid-column: 2/3;
                grid-row: 3/4;
            }
        </style>
    </head>
    <body>
        <dvi class="parent">
            <div class="c1"></div>
            <div class="Header">Header</div>
            <div class="search">search</div>
            <div class="right">right side</div>
            <div class="left"> left side</div>
            <div class="middle">middle column</div>
        </dvi>
    </body>
</html>
