<!DOCTYPE html>
<html>
    <head>
        <title>Anchor</title>
        <!--internal css-->
        <style>
            img{
                border: 1px solid green;  /*px is used for image sizes shows in pixel*/
                margin: 30px;
                width: 100px;
                border-radius: 10px;
                display: block;
             }
            .c1:hover{                     /*hover is used for highlighting the image while placing the mouse on it*/
                border: 5px solid red;
                border-radius: 10px;
            }
            .c2:hover{
                border:10px solid blue;
                border-radius: 20px;
            }
            .c3:hover{
                border: 15px solid green;
                border-radius: 30px;
            }
         </style>
       </head>
        <body>
            <a href="https://www.flipkart.com/" target="_blank">
                 <img src="flipkart.png" alt="Flipkart"class="c1">
                </a>
               <!--<img> is used for adding the image-->
            <img src= "amzn.png" alt="Amazon" class="c2">  <!--scr is used for locating the file, alt is used for alternative text fgo the image-->
            <img src="meesho.jpg" alt="Meesho" class="c3"
        </body>
</html>
